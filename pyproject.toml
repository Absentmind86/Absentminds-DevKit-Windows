[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E402",   # module-level import not at top — intentional in scripts that extend sys.path
    "B008",   # do not perform function calls in default arguments
    "SIM105", # contextlib.suppress — Flet GUI uses try/except/pass for widget update races
    "SIM108", # ternary operator — readability preference
    "SIM112", # env var case — Windows env vars are case-insensitive; ProgramFiles is conventional
    "UP007",  # X | Y union syntax (keep Optional/Union for clarity in signatures)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # assert is fine in tests
