# AM-DevKit — user-facing configuration
#
# Intent: user-overrideable settings that survive repo updates.
# Status: NOT currently read by the installer — future configuration pass.
#         The authoritative version string lives in the repo-root VERSION file,
#         which is read by core/install_context.py at runtime.
#
# Do not auto-generate values here. Edit intentionally before running install.

[devkit]
# The installer version is sourced from the VERSION file, not from here.
# Uncomment to document which config snapshot corresponds to which release.
# version = "1.0.0"

# [install]
# dry_run = false              # Default: false. Set true to preview without installing.
# skip_restore_point = false   # Default: false. Strongly recommended to keep true.
# skip_dotfiles = false        # Default: false. Set true to skip dotfile seeding.
# yes = false                  # Default: false. Set true to suppress all confirmation prompts.

# [profiles]
# selected = ["ai-ml", "web-fullstack"]   # Pre-select profiles (avoids GUI prompt)
# absentmind = false                      # Set true to activate all core profiles silently

# [sanitation]
# enabled = false              # Default: false. Opt-in only.
# preset = "minimal"           # "minimal" or "standard"

# [catalog]
# exclude = []                 # List of tool IDs to skip, e.g. ["cursor", "tailscale"]
